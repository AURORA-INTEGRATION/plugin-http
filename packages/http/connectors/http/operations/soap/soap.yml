kind: python_service
id: common.connectors.http.soap
name: HTTP — SOAP / WSDL
script: connectors/http/operations/soap/soap.py
input:
  http_alias:
    type: string
    required: false
    description: Istanza connector http (base_url/headers/TLS). Opzionale — ometti e metti un URL assoluto in `path`.
  url:
    type: string
    required: false
    description: URL assoluto dell'endpoint SOAP. Se presente, ha priorità sulla base_url del connettore.
  path:
    type: string
    required: false
    description: Path concatenato a url o alla base_url del connettore.
  soap_action:
    type: string
    required: false
    description: Header SOAPAction.
  body:
    type: string
    required: false
    description: Envelope SOAP XML completo già pronto. In alternativa usa operation+namespace+payload per costruirlo a runtime.
  operation:
    type: string
    required: false
    description: Nome dell'elemento richiesta (wrapper SOAP). Se presente e `body` è vuoto, l'envelope viene costruito da payload.
  namespace:
    type: string
    required: false
    description: Target namespace dell'operazione (xmlns dell'elemento richiesta).
  payload:
    type: any
    required: false
    description: Dati strutturati della richiesta (object). Marshalled a XML — gli array ripetono l'elemento, gli object annidano.
  headers:
    type: object
    required: false
    description: Header aggiuntivi.
  auth:
    type: object
    required: false
    description: >-
      Oggetto auth unico (consigliato). Campi: type (none|bearer|basic|api_key|custom|digest),
      token (bearer), username+password (basic|digest), header_name+value (api_key|custom).
      Validato: se il tipo richiede campi mancanti → errore. Alternativa ai campi auth_* legacy.
  raise_for_status:
    type: boolean
    required: false
    description: Se true, uno status >= 400 solleva un errore strutturato (HttpError) invece di tornare la response.
  auth_type:
    type: string
    required: false
    description: "[legacy] Tipo auth (none|bearer|basic|api_key|custom|digest). Preferisci l'oggetto `auth`."
  auth_value:
    type: string
    required: false
    description: "[legacy] Token (bearer) o valore API key / custom header."
  auth_username:
    type: string
    required: false
    description: "[legacy] Username (basic|digest)."
  auth_password:
    type: string
    required: false
    description: "[legacy] Password (basic|digest)."
  auth_header_name:
    type: string
    required: false
    description: "[legacy] Nome header per api_key / custom."
output:
  status_code:
    type: integer
  body:
    type: any
  headers:
    type: object

ui:
  mode: form
  operation: soap
  fields:
    - { name: url, label: URL, type: text }
    - { name: path, label: Path, type: text }
    - { name: soap_action, label: SOAPAction, type: text }
    - { name: body, label: Envelope XML, type: code, language: xml, required: true }
    - { name: headers, label: Headers, type: keyvalue }
    - { name: raise_for_status, label: Errore su HTTP >= 400, type: checkbox, default: false }
    - { name: auth_type, label: Auth, type: select, options: [none, bearer, basic, api_key, custom, digest], default: none }
    - { name: auth_value, label: Token / API key / valore, type: text }
    - { name: auth_username, label: Username (basic/digest), type: text }
    - { name: auth_password, label: Password (basic/digest), type: text }
    - { name: auth_header_name, label: Nome header (api_key/custom), type: text }
