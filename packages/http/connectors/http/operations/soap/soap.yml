kind: python_service
id: common.connectors.http.soap
name: HTTP — SOAP / WSDL
script: connectors/http/operations/soap/soap.py
input:
  http_alias:
    type: string
    required: false
    description: Istanza connector http (base_url/headers/TLS). Opzionale — ometti e metti un URL assoluto in `path`.
  url:
    type: string
    required: false
    description: URL assoluto dell'endpoint SOAP. Se presente, ha priorità sulla base_url del connettore.
  path:
    type: string
    required: false
    description: Path concatenato a url o alla base_url del connettore.
  soap_action:
    type: string
    required: false
    description: Header SOAPAction.
  body:
    type: string
    required: false
    description: Envelope SOAP XML completo già pronto. In alternativa usa operation+namespace+payload per costruirlo a runtime.
  operation:
    type: string
    required: false
    description: Nome dell'elemento richiesta (wrapper SOAP). Se presente e `body` è vuoto, l'envelope viene costruito da payload.
  namespace:
    type: string
    required: false
    description: Target namespace dell'operazione (xmlns dell'elemento richiesta).
  payload:
    type: any
    required: false
    description: Dati strutturati della richiesta (object). Marshalled a XML — gli array ripetono l'elemento, gli object annidano.
  headers:
    type: object
    required: false
    description: Header aggiuntivi.
  auth_type:
    type: string
    required: false
    description: Tipo auth (none|bearer|basic|api_key) — input del flusso.
  auth_value:
    type: string
    required: false
    description: Token (bearer) o valore API key.
  auth_username:
    type: string
    required: false
    description: Username (basic).
  auth_password:
    type: string
    required: false
    description: Password (basic).
  auth_header_name:
    type: string
    required: false
    description: Nome header per la API key.
output:
  status_code:
    type: integer
  body:
    type: any
  headers:
    type: object

ui:
  mode: form
  operation: soap
  fields:
    - { name: url, label: URL, type: text }
    - { name: path, label: Path, type: text }
    - { name: soap_action, label: SOAPAction, type: text }
    - { name: body, label: Envelope XML, type: code, language: xml, required: true }
    - { name: headers, label: Headers, type: keyvalue }
    - { name: auth_type, label: Auth, type: select, options: [none, bearer, basic, api_key], default: none }
    - { name: auth_value, label: Token / API key, type: text }
    - { name: auth_username, label: Username (basic), type: text }
    - { name: auth_password, label: Password (basic), type: text }
    - { name: auth_header_name, label: Header API key, type: text }
