kind: python_service
id: common.connectors.http.soap
name: HTTP — SOAP / WSDL
script: connectors/http/operations/soap/soap.py
input:
  http_alias:
    type: string
    required: false
    description: Istanza connector http (base_url/headers/TLS). Opzionale — ometti e metti un URL assoluto in `path`.
  url:
    type: string
    required: false
    description: URL assoluto dell'endpoint SOAP. Se presente, ha priorità sulla base_url del connettore.
  path:
    type: string
    required: false
    description: Path concatenato a url o alla base_url del connettore.
  soap_action:
    type: string
    required: false
    description: Header SOAPAction.
  body:
    type: string
    required: false
    description: Envelope SOAP XML completo già pronto. In alternativa usa operation+namespace+payload per costruirlo a runtime.
  operation:
    type: string
    required: false
    description: Nome dell'elemento richiesta (wrapper SOAP). Se presente e `body` è vuoto, l'envelope viene costruito da payload.
  namespace:
    type: string
    required: false
    description: Target namespace dell'operazione (xmlns dell'elemento richiesta).
  payload:
    type: any
    required: false
    description: Dati strutturati della richiesta (object). Marshalled a XML — gli array ripetono l'elemento, gli object annidano.
  headers:
    type: object
    required: false
    description: Header aggiuntivi.
  auth:
    type: object
    required: false
    description: Autenticazione (validata prima della chiamata). Vuoto o type=none = nessuna.
    properties:
      type:
        type: string
        enum: [none, bearer, basic, api_key, custom, digest]
        required: true
        description: Tipo auth.
      token:
        type: string
        description: Token (bearer).
      username:
        type: string
        description: Username (basic|digest).
      password:
        type: string
        description: Password (basic|digest).
      header_name:
        type: string
        description: Nome header (api_key|custom).
      value:
        type: string
        description: Valore header (api_key|custom).
  raise_for_status:
    type: boolean
    required: false
    description: Se true, uno status >= 400 solleva un errore strutturato (HttpError) invece di tornare la response.
output:
  status_code:
    type: integer
  body:
    type: any
  headers:
    type: object

ui:
  mode: form
  operation: soap
  fields:
    - { name: url, label: URL, type: text }
    - { name: path, label: Path, type: text }
    - { name: soap_action, label: SOAPAction, type: text }
    - { name: body, label: Envelope XML, type: code, language: xml, required: true }
    - { name: headers, label: Headers, type: keyvalue }
    - { name: raise_for_status, label: Errore su HTTP >= 400, type: boolean }
    - { name: auth, label: Auth, type: object }
