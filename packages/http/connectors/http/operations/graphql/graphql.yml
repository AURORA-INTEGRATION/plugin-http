kind: python_service
id: common.connectors.http.graphql
name: HTTP — GraphQL
script: connectors/http/operations/graphql/graphql.py
input:
  http_alias:
    type: string
    required: false
    description: Istanza connector http (base_url/headers/TLS). Opzionale — ometti e metti un URL assoluto in `path`.
  url:
    type: string
    required: false
    description: URL assoluto dell'endpoint GraphQL. Se presente, ha priorità sulla base_url del connettore.
  path:
    type: string
    required: false
    description: Path concatenato a url o alla base_url del connettore.
  query:
    type: string
    required: true
    description: Query o mutation GraphQL.
  variables:
    type: any
    required: false
    description: Variabili (oggetto JSON; stringa JSON accettata).
  headers:
    type: object
    required: false
    description: Header aggiuntivi.
  auth:
    type: object
    required: false
    description: Autenticazione (validata prima della chiamata). Vuoto o type=none = nessuna.
    properties:
      type:
        type: string
        enum: [none, bearer, basic, api_key, custom, digest]
        required: true
        description: Tipo auth.
      token:
        type: string
        description: Token (bearer).
      username:
        type: string
        description: Username (basic|digest).
      password:
        type: string
        description: Password (basic|digest).
      header_name:
        type: string
        description: Nome header (api_key|custom).
      value:
        type: string
        description: Valore header (api_key|custom).
  raise_for_status:
    type: boolean
    required: false
    description: Se true, uno status >= 400 solleva un errore strutturato (HttpError) invece di tornare la response.
output:
  status_code:
    type: integer
  body:
    type: any
  headers:
    type: object

ui:
  mode: form
  operation: graphql
  fields:
    - { name: url, label: URL, type: text }
    - { name: path, label: Path, type: text }
    - { name: query, label: Query, type: code, language: graphql, required: true }
    - { name: variables, label: Variabili (JSON), type: code, language: json }
    - { name: headers, label: Headers, type: keyvalue }
    - { name: raise_for_status, label: Errore su HTTP >= 400, type: boolean }
    - { name: auth, label: Auth, type: object }
