kind: python_service
id: common.connectors.http.request
name: HTTP — Request
script: connectors/http/operations/request/request.py
input:
  http_alias:
    type: string
    required: false
    description: Istanza connector http (base_url/headers/TLS). Opzionale — ometti e metti un URL assoluto in `path`.
  method:
    type: string
    required: true
    description: Metodo HTTP (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS).
  url:
    type: string
    required: false
    description: URL assoluto (es. https://api.example.com/x). Se presente, ha priorità sulla base_url del connettore.
  path:
    type: string
    required: false
    description: Path concatenato a url (se presente) o alla base_url del connettore. Es. /clienti/42.
  params:
    type: object
    required: false
    description: Query string.
  headers:
    type: object
    required: false
    description: Header aggiuntivi.
  body:
    type: any
    required: false
    description: Corpo (oggetto/array → JSON; stringa accettata). Ignorato per GET/HEAD.
  auth:
    type: object
    required: false
    description: Autenticazione (validata prima della chiamata). Vuoto o type=none = nessuna.
    properties:
      type:
        type: string
        enum: [none, bearer, basic, api_key, custom, digest]
        required: true
        description: Tipo auth.
      token:
        type: string
        description: Token (bearer).
      username:
        type: string
        description: Username (basic|digest).
      password:
        type: string
        description: Password (basic|digest).
      header_name:
        type: string
        description: Nome header (api_key|custom).
      value:
        type: string
        description: Valore header (api_key|custom).
  raise_for_status:
    type: boolean
    required: false
    description: Se true, uno status >= 400 solleva un errore strutturato (HttpError) invece di tornare la response.
output:
  status_code:
    type: integer
  body:
    type: any
  headers:
    type: object

ui:
  mode: form
  operation: request
  fields:
    - { name: method, label: Metodo, type: select, options: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS], default: GET, required: true }
    - { name: url, label: URL, type: text }
    - { name: path, label: Path, type: text }
    - { name: params, label: Query params, type: keyvalue }
    - { name: headers, label: Headers, type: keyvalue }
    - { name: body, label: Body (JSON), type: code, language: json }
    - { name: raise_for_status, label: Errore su HTTP >= 400, type: boolean }
    - { name: auth, label: Auth, type: object }
